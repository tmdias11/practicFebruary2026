<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchCritics</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/catalogue.css">
    <script src="./js/script.js" defer></script>
    <script type="module" src="./js/auth.js" defer></script>
    <script type="module" src="./js/catalogue.js" defer></script>
</head>
<body>
    <header id="header">
        <a href="index.html" id="home">WatchCritics</a>
        <input type="search" name="Searchbar" id="search" placeholder="Поиск...">
        <a href="./pages/profile.html" id="profile">Профиль</a>
        <a href="./pages/signin.html" id="signin">Войти</a>
        <a href="./pages/signup.html" id="signup">Регистрация</a>
        <a href="./pages/cart.html">Корзина</a>
        <p id="logout">Выйти</p>
        <button id="changeTheme" onclick="changeTheme()"></button>
    </header>
    <main>
        <div class="banner">
            <div class="banner-slider" id="bannerSlider"></div>
            <button class="banner-btn prev" id="prevBtn">❮</button>
            <button class="banner-btn next" id="nextBtn">❯</button>
        </div>

        <div class="filters">
            <select id="sort">
                <option value="title">По алфавиту</option>
                <option value="rating">По рейтингу</option>
                <option value="ratingCount">По популярности</option>
                <option value="year">По году</option>
                <option value="genre">По жанру</option>
            </select>
            <select id="sortDir">
                <option value="asc">По возрастанию</option>
                <option value="desc">По убыванию</option>
            </select>
            <select id="sortGenre">
                <option value="fantasy">Фантастика</option>
                <option value="action">Боевик</option>
                <option value="drama">Драма</option>
                <option value="comedy">Комедия</option>
                <option value="horror">Ужас</option>    
                <option value="detective">Детектив</option>
                <option value="thriller">Триллер</option>
            </select>
        </div>

        <div id="movBody"></div>
        <button id="showMoreBtn">Показать ещё</button>

        <div id="adminPanelCatalogue">
            <form id="addMovieForm">
                <input type="text" id="title" placeholder="Название фильма" required>
                <input type="text" id="country" placeholder="Страна" required>
                <input type="number" id="year" placeholder="Год" required>
                <input type="text" id="img" placeholder="Ссылка на обложку">
                <input type="text" id="trailerUrl" placeholder="Ссылка на трейлер">
                <input type="text" name="rating" id="rating" placeholder="Рейтинг (через запятую)">
                <input type="text" id="genres" placeholder="Жанры (через запятую)">
                <button type="submit">Добавить фильм</button>
            </form>
        </div>
    </main>
</body>
</html>
