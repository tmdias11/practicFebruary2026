<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchCritics</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/catalogue.css">
    <link rel="stylesheet" href="../css/moviePage.css">
    <script src="../js/script.js"></script>
    <script src="../js/auth.js" type="module"></script>
    <script type="module" src="../js/moviePage.js"></script>
</head>
<body>
    <header id="header">
            <a href="../index.html" id="home">WatchCritics</a>
            <input type="search" name="Searchbar" id="search" placeholder="Поиск...">
            <a href="./profile.html" id="profile">Профиль</a>
            <a href="./signin.html" id="signin">Войти</a>
            <a href="./signup.html" id="signup">Регистрация</a>
            <a href="./cart.html">Корзина</a>
            <p id="logout">Выйти</p>
            <button id="changeTheme" onclick="changeTheme()"></button>
        </header>
    <main>
        <div id="movieContainer"></div>
        <div id="movieGenres"></div>
        <div id="starsContainer">
            <div class="starRating" id="star1"></div>
            <div class="starRating" id="star2"></div>
            <div class="starRating" id="star3"></div>
            <div class="starRating" id="star4"></div>
            <div class="starRating" id="star5"></div>
            <div class="starRating" id="star6"></div>
            <div class="starRating" id="star7"></div>
            <div class="starRating" id="star8"></div>
            <div class="starRating" id="star9"></div>
            <div class="starRating" id="star10"></div>
        </div>
        <button id="buyTicketBtn">Купить билет</button>
        <div id="recommendationsContainer"></div>

        <div id="commentsSection">

            <form id="commentForm">
                <textarea 
                    id="commentText"
                    placeholder="Напишите комментарий..."
                    required
                ></textarea>

                <button type="submit">
                    Отправить
                </button>
            </form>

            <div id="commentsContainer"></div>

        </div>
        <div id="adminPanelMoviePage">
            <form id="addMovieForm">
            <input type="text" id="titleUpdate" placeholder="Название фильма">
            <input type="text" id="countryUpdate" placeholder="Страна">
            <input type="number" id="yearUpdate" placeholder="Год">
            <input type="text" id="imgUpdate" placeholder="Ссылка на обложку">
            <input type="text" id="trailerUrlUpdate" placeholder="Ссылка на трейлер">
            <input type="number" id="ratingUpdate" placeholder="Рейтинг">
            <button type="submit">Редактировать фильм</button>
            <button id="deleteMovie">Удалить фильм</button>
            </form>
        </div>
    </main>
</body>
</html>
