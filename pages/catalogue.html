<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchCritics</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/catalogue.css">
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/catalogue.js"></script>
</head>
<body>
    <header id="header">
        <a href="../index.html" id="home">WatchCritics</a>
        <a href="catalogue.html" id="catalogue">Каталог</a>
        <input type="search" name="Searchbar" id="search" placeholder="Поиск...">
        <a href="profile.html" id="profile">Профиль</a>
        <a href="signin.html" id="signin">Войти</a>
        <a href="signup.html" id="signup">Регистрация</a>
        <p id="logout">Выйти</p>
    </header>
    <main>
        <select id="sort">
            <option value="title">По алфавиту</option>
            <option value="rating">По рейтингу</option>
            <option value="ratingCount">По популярности</option>
            <option value="year">По году</option>
        </select>
        <select id="sortDir">
            <option value="asc">По возрастанию</option>
            <option value="desc">По убыванию</option>
        </select>
        <div id="movBody">
        </div>
        <div id="adminPanelCatalogue">
            <form id="addMovieForm">
            <input type="text" id="title" placeholder="Название фильма" required>
            <input type="text" id="country" placeholder="Страна" required>
            <input type="number" id="year" placeholder="Год" required>
            <input type="text" id="img" placeholder="Ссылка на обложку">
            <input type="text" id="trailerUrl" placeholder="Ссылка на трейлер">
            <input type="text" name="rating" id="rating" placeholder="Рейтинг (через запятую)">
            <button type="submit">Добавить фильм</button>
        </div>
</form>

<div id="movBody"></div>

    </main>
</body>
</html>
